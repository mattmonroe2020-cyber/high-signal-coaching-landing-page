<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — High Signal Coaching</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://mattmonroe2020-cyber.github.io/high-signal-coaching-landing-page/thank-you.html" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:    #F7F7F5;
      --text:  #2C3E50;
      --green: #4A7C59;
      --gold:  #A4905E;
      --muted: #6b7280;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Syne', system-ui, sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.65;
      margin-bottom: 1rem;
    }
    a.btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.85rem 2rem;
      background: var(--gold);
      color: var(--text);
      font-weight: 600;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .footer-link {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .footer-link a {
      color: var(--green);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="icon">✓</div>
  <h1>Request received.</h1>
  <p>
    I'll be in touch within 48 hours to confirm your fit call.
    Check your inbox — and your spam folder, just in case.
  </p>
  <p>
    In the meantime, the FAQ on the main page covers most of what people
    want to know before we talk.
  </p>
  <a href="index.html" class="btn">← Back to the site</a>
  <p class="footer-link">
    Questions? <a href="mailto:hello@highsignalcoaching.com">hello@highsignalcoaching.com</a>
  </p>
</body>
</html>
